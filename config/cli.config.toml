# ChessRTK CLI configuration
#
# These are the default values used by the CLI. Most commands can override
# them with flags for a single run.

# Engine protocol
# TOML file that describes how to talk to the UCI engine.
# Stockfish-style commands work for most engines, but some engines need their
# own protocol file.
protocol-path = "config/default.engine.toml"

# Local model paths
# Model binaries are not committed to this repository. Fetch the default LC0 CNN
# weights with `./install.sh --models`, or place your own files under models/.
lc0-model-path = "models/leela_112planes-10blocksx128-policyhead80-valuehead32-policy4672-wdl3.bin"

# Used by `tag-text` and `puzzle-text` when --model is omitted.
t5-model-path = "models/t5.bin"

# Output
# Directory or file root for computed outputs such as mined puzzles.
#
# Common values:
#   output = "dump/"        # write timestamped files under dump/
#   output = "run.json"     # write run.puzzles.json / run.nonpuzzles.json
#   output = ""             # print to stdout where supported
output = "dump/"

# Engine pool
# Number of engine processes to run in parallel. Increase only if your machine
# and engine can handle the load.
engine-instances = 4

# Search limits
# Per-position engine budget.
max-nodes = 50_000_000
max-duration = 1_000_000

# Threat tags
# Centipawn thresholds for null-move threat tagging.
threat-min-cp = 150
threat-equalize-min-cp = 150
threat-equalize-target-cp = 50

# Mining dedup cache
# Maximum analyzed positions remembered during mining. When full, the oldest
# entries are evicted.
#
# Rough memory estimate per cached position:
#   200-400 bytes on a 64-bit JVM with compressed oops
#   1 GB RAM ~= 2.5-5.0 million cached positions
puzzle-analysis-cache = 5_000_000

# Puzzle filters
# These filters use the Filter DSL. They decide whether an analyzed position is
# accepted as a candidate puzzle.
#
# Calibrate these thresholds to your engine. Different engines can report evals
# with different scale, contempt, pruning, and network behavior.

# Quality gate:
# Require at least 50M nodes on both PV1 and PV2 before accepting a position.
puzzle-quality = """
gate=AND;null=false;empty=false;
leaf[gate=AND;break=1;nodes>=50000000];
leaf[gate=AND;break=2;null=false;empty=false;nodes>=50000000];
"""

# Winning puzzle:
# PV1 is clearly better (+300 cp or more), while PV2 is neutral or worse.
puzzle-winning = """
gate=AND;
leaf[eval>=300];
leaf[break=2;null=false;eval<=0];
"""

# Drawing puzzle:
# PV1 holds equality or better, while PV2 drops sharply.
puzzle-drawing = """
gate=AND;
leaf[eval>=0];
leaf[break=2;null=false;eval<=-300];
"""

# Accelerate prefilter:
# Reject clear non-puzzles early after a cheaper two-PV depth check.
# Keep this conservative to avoid false negatives.
puzzle-accelerate = """
gate=AND;
leaf[break=1;nodes>=2000000];
leaf[break=2;null=false;nodes>=2000000];
leaf[gate=OR;eval<300;leaf[break=2;eval>0]];
leaf[gate=OR;eval<0;leaf[break=2;eval>-300]];
"""
