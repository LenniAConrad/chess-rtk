<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ChessRTK Move Tree logo concept</title>
  <desc id="desc">A ChessRTK wordmark with a technical move tree growing from a board square.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="1" stop-color="#eef5ef"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e7d57"/>
      <stop offset="1" stop-color="#123b2b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="48" fill="#f4f7f3"/>
  <rect x="54" y="54" width="1092" height="312" rx="36" fill="url(#panel)" stroke="#d6dfd7" stroke-width="2"/>
  <g transform="translate(92 82)">
    <rect x="0" y="0" width="256" height="256" rx="28" fill="#102018"/>
    <g transform="translate(38 38)">
      <rect x="0" y="0" width="180" height="180" rx="14" fill="#fffefb"/>
      <g fill="#cbd8ce">
        <rect x="0" y="0" width="45" height="45"/><rect x="90" y="0" width="45" height="45"/>
        <rect x="45" y="45" width="45" height="45"/><rect x="135" y="45" width="45" height="45"/>
        <rect x="0" y="90" width="45" height="45"/><rect x="90" y="90" width="45" height="45"/>
        <rect x="45" y="135" width="45" height="45"/><rect x="135" y="135" width="45" height="45"/>
      </g>
      <circle cx="90" cy="135" r="16" fill="#d8a63a"/>
      <g fill="none" stroke="#2e7d57" stroke-width="8" stroke-linecap="round">
        <path d="M90 135 C92 96 118 78 148 50"/>
        <path d="M90 135 C62 108 48 76 38 42"/>
        <path d="M90 135 C122 144 146 158 168 170"/>
      </g>
      <g fill="#123b2b">
        <circle cx="148" cy="50" r="11"/>
        <circle cx="38" cy="42" r="11"/>
        <circle cx="168" cy="170" r="11"/>
      </g>
    </g>
  </g>
  <g transform="translate(404 112)">
    <text x="0" y="76" fill="#123b2b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="88" font-weight="850" letter-spacing="0">ChessRTK</text>
    <text x="2" y="124" fill="#2e7d57" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="0">MOVE TREE TOOLKIT</text>
    <text x="2" y="173" fill="#445047" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="0">Legal moves, search branches, filters, and datasets.</text>
  </g>
