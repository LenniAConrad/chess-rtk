<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChessRTK Logo Concepts</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px;
      background: #edf2ee;
      color: #17221b;
      font: 16px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0 0 8px;
      color: #123b2b;
      font-size: 2rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: #647268;
    }

    main {
      display: grid;
      gap: 22px;
      max-width: 1180px;
      margin: 0 auto;
    }

    article {
      padding: 18px;
      border: 1px solid #d6dfd7;
      border-radius: 8px;
      background: #fffefb;
      box-shadow: 0 16px 42px rgba(20, 37, 27, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      color: #123b2b;
      font-size: 1rem;
    }

    img {
      display: block;
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>ChessRTK Logo Concepts</h1>
      <p>Five vector directions for the project mark.</p>
    </header>
    <article>
      <h2>1. Perft Path</h2>
      <img src="perft-path.svg" alt="ChessRTK Perft Path logo concept">
    </article>
    <article>
      <h2>2. Move Tree</h2>
      <img src="move-tree.svg" alt="ChessRTK Move Tree logo concept">
    </article>
    <article>
      <h2>3. FEN Grid</h2>
      <img src="fen-grid.svg" alt="ChessRTK FEN Grid logo concept">
    </article>
    <article>
      <h2>4. RTK Monogram</h2>
      <img src="rtk-monogram.svg" alt="ChessRTK RTK Monogram logo concept">
    </article>
    <article>
      <h2>5. Engine Line</h2>
      <img src="engine-line.svg" alt="ChessRTK Engine Line logo concept">
    </article>
  </main>
</body>
</html>
